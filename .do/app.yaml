# =============================================================================
# DigitalOcean App Platform - App Spec
# POS System (Laravel 12 + Livewire + MySQL)
# No Docker required — uses DigitalOcean buildpacks
# =============================================================================
#
# DEPLOYMENT STEPS:
# 1. Push this repo to GitHub
# 2. Go to DigitalOcean → App Platform → Create App
# 3. Connect your GitHub repo (auto-detects this file)
# 4. Set APP_KEY and APP_URL in the dashboard
# 5. Deploy!
#
# =============================================================================

name: pos-system
region: sgp1  # Singapore (closest to Sri Lanka)
               # Options: nyc1, sfo1, ams3, sgp1, lon1, fra1, blr1, tor1, syd1

services:
  - name: pos-web
    # ---- Source ----
    github:
      repo: sanjuka2001/pos-system
      branch: main
      deploy_on_push: true

    # ---- Buildpacks (Node for Vite + PHP) ----
    buildpacks:
      - name: node
      - name: php

    build_command: |
      npm install
      npm run build
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan migrate --force

    run_command: heroku-php-apache2 public/

    # ---- Instance ----
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/mo
    # Options: basic-xxs ($5), basic-xs ($10), basic-s ($18), basic-m ($36)

    http_port: 8080

    # ---- Environment Variables ----
    envs:
      - key: APP_NAME
        value: "POS System"

      - key: APP_ENV
        value: "production"

      - key: APP_DEBUG
        value: "false"

      - key: APP_URL
        value: "${APP_URL}"
        # Set in DO dashboard → e.g. https://pos-system-xxxxx.ondigitalocean.app

      - key: APP_KEY
        type: SECRET
        value: "${APP_KEY}"
        # Generate locally: php artisan key:generate --show

      - key: LOG_CHANNEL
        value: "stderr"

      - key: LOG_LEVEL
        value: "warning"

      # ---- Database (Aiven MySQL) ----
      - key: DB_CONNECTION
        value: "mysql"

      - key: DB_HOST
        value: "nipun-pos-system-nipunsanjukathilakarathna-60ab.i.aivencloud.com"

      - key: DB_PORT
        value: "13862"

      - key: DB_DATABASE
        value: "defaultdb"

      - key: DB_USERNAME
        value: "avnadmin"

      - key: DB_PASSWORD
        type: SECRET
        value: "${DB_PASSWORD}"
        # Set your Aiven password in the DO dashboard

      - key: MYSQL_ATTR_SSL_CA
        value: "/app/storage/certs/ca.pem"

      # ---- Session & Cache ----
      - key: SESSION_DRIVER
        value: "file"

      - key: CACHE_STORE
        value: "file"

      - key: QUEUE_CONNECTION
        value: "sync"

      - key: BCRYPT_ROUNDS
        value: "12"

