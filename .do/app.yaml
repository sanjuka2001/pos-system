# =============================================================================
# DigitalOcean App Platform - App Spec
# POS System (Laravel 12 + Livewire + MySQL)
# =============================================================================
#
# DEPLOYMENT STEPS:
# 1. Push this repo to GitHub/GitLab
# 2. Go to DigitalOcean → App Platform → Create App
# 3. Either:
#    a) Connect your GitHub repo (auto-detects this file), OR
#    b) Use CLI: doctl apps create --spec .do/app.yaml
# 4. Add a MySQL database in the DigitalOcean dashboard
# 5. Set the environment variables below
#
# =============================================================================

name: pos-system
region: sgp1  # Singapore (closest to Sri Lanka) — change if needed
               # Options: nyc1, sfo1, ams3, sgp1, lon1, fra1, blr1, tor1, syd1

services:
  - name: pos-web
    # ---- Source Configuration ----
    github:
      repo: sanjuka2001/pos-system
      branch: main
      deploy_on_push: true

    # ---- Docker Configuration ----
    dockerfile_path: Dockerfile

    # ---- Instance Configuration ----
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/mo — upgrade as needed
    # Options: basic-xxs ($5), basic-xs ($10), basic-s ($18), basic-m ($36)

    http_port: 8080

    # ---- Health Check ----
    health_check:
      http_path: /
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # ---- Environment Variables ----
    envs:
      - key: APP_NAME
        value: "POS System"

      - key: APP_ENV
        value: "production"

      - key: APP_DEBUG
        value: "false"

      - key: APP_URL
        value: "${APP_URL}"
        # Set this in the DO dashboard to your app's URL
        # e.g., https://pos-system-xxxxx.ondigitalocean.app

      - key: APP_KEY
        value: "${APP_KEY}"
        type: SECRET
        # Generate with: php artisan key:generate --show
        # Paste the base64:... value in the DO dashboard

      - key: LOG_CHANNEL
        value: "stderr"

      - key: LOG_LEVEL
        value: "warning"

      # ---- Database (DigitalOcean Managed MySQL) ----
      - key: DB_CONNECTION
        value: "mysql"

      - key: DB_HOST
        value: "${db.HOSTNAME}"

      - key: DB_PORT
        value: "${db.PORT}"

      - key: DB_DATABASE
        value: "${db.DATABASE}"

      - key: DB_USERNAME
        value: "${db.USERNAME}"

      - key: DB_PASSWORD
        value: "${db.PASSWORD}"
        type: SECRET

      # ---- Session & Cache ----
      - key: SESSION_DRIVER
        value: "file"

      - key: CACHE_STORE
        value: "file"

      - key: QUEUE_CONNECTION
        value: "sync"

      - key: FILESYSTEM_DISK
        value: "local"

      - key: BCRYPT_ROUNDS
        value: "12"

# ---- Database Component ----
databases:
  - name: db
    engine: MYSQL
    version: "8"
    size: db-s-1vcpu-1gb  # $15/mo — smallest managed MySQL
    num_nodes: 1
